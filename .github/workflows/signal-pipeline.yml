name: AURUM Signal Pipeline

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-signal-pipeline:
    name: Run Signal Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Trigger signal pipeline
        run: |
          curl --fail --silent --show-error \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -X GET "${{ secrets.APP_URL }}/api/cron/signal" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
