name: AURUM Thesis Generation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate-thesis:
    name: Generate Public Thesis
    runs-on: ubuntu-latest
    steps:
      - name: Trigger thesis generation
        run: |
          curl --fail --silent --show-error \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -X GET "${{ secrets.APP_URL }}/api/cron/thesis" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
